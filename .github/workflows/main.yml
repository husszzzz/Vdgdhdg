name: Build Alhussaini Dylib Docker

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: theos/theos:latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Tweak
        run: |
          export THEOS=/theos
          # تحميل الـ SDK داخل الحاوية بسرعة فائقة
          mkdir -p $THEOS/sdks
          curl -L "https://github.com/theos/sdks/raw/master/iPhoneOS14.5.sdk.tar.xz" | tar -xJf - -C $THEOS/sdks/
          make package FINALPACKAGE=1
        
      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: Alhussaini-Dylib
          path: .theos/obj/*.dylib
