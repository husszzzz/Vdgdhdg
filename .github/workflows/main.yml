name: Build Alhussaini Dylib

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Theos
        run: |
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
          echo "THEOS=/Users/runner/theos" >> $GITHUB_ENV

      - name: Build Tweak
        run: |
          export THEOS=/Users/runner/theos
          make package FINALPACKAGE=1
        
      - name: Upload Result
        uses: actions/upload-artifact@v3
        with:
          name: Alhussaini-Dylib
          path: .theos/obj/*.dylib
