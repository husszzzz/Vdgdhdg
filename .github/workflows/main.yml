name: Build Alhussaini Dylib Final Path

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Fast Setup
        run: |
          git clone --recursive https://github.com/theos/theos.git ~/theos
          echo "THEOS=~/theos" >> $GITHUB_ENV
          # تحميل SDK مضغوط من رابط مباشر ومستقر
          mkdir -p ~/theos/sdks
          curl -L "https://github.com/theos/sdks/raw/master/iPhoneOS14.5.sdk.tar.xz" -o sdk.tar.xz
          tar -xf sdk.tar.xz -C ~/theos/sdks/
          rm sdk.tar.xz

      - name: Compile
        run: |
          export THEOS=~/theos
          make package FINALPACKAGE=1
        
      - name: Get File
        uses: actions/upload-artifact@v4
        with:
          name: Alhussaini-Dylib
          path: .theos/obj/*.dylib
