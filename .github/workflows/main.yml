name: Build Alhussaini Dylib

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Theos
        run: |
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
          echo "THEOS=/Users/runner/theos" >> $GITHUB_ENV
          
      - name: Force Install SDK Manual
        run: |
          export THEOS=/Users/runner/theos
          mkdir -p $THEOS/sdks
          curl -L "https://github.com/theos/sdks/raw/master/iPhoneOS14.5.sdk.tar.xz" -o $THEOS/sdks/iPhoneOS14.5.sdk.tar.xz
          tar -xf $THEOS/sdks/iPhoneOS14.5.sdk.tar.xz -C $THEOS/sdks/
          rm $THEOS/sdks/iPhoneOS14.5.sdk.tar.xz

      - name: Build Tweak
        run: |
          export THEOS=/Users/runner/theos
          make package FINALPACKAGE=1
        
      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: Alhussaini-Dylib
          path: .theos/obj/*.dylib
