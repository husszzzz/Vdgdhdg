name: Build Alhussaini Dylib Final Path

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Fast Setup Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git ~/theos
          echo "THEOS=~/theos" >> $GITHUB_ENV
          mkdir -p ~/theos/sdks
          curl -L "https://github.com/theos/sdks/archive/master.tar.gz" -o sdk.tar.gz
          tar -xf sdk.tar.gz -C ~/theos/sdks --strip-components=1
          rm sdk.tar.gz

      - name: Compile Dylib
        run: |
          export THEOS=~/theos
          make package FINALPACKAGE=1

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Alhussaini-Dylib
          path: .theos/obj/*.dylib
