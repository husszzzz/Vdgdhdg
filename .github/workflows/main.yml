name: Build SmartButtons Tweak

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: false   # لا نجلب submodules لأننا سنثبت Theos بطريقة مختلفة

    - name: Install Theos
      run: |
        git clone --depth 1 https://github.com/theos/theos.git $HOME/theos
        echo "THEOS=$HOME/theos" >> $GITHUB_ENV
        echo "$HOME/theos/bin" >> $GITHUB_PATH

    - name: Install dependencies
      run: |
        brew install ldid dpkg
        sudo ln -sf /usr/local/bin/ldid $HOME/theos/bin/ldid

    - name: Build Tweak
      run: |
        export THEOS=$HOME/theos
        make package

    - name: Upload .deb
      uses: actions/upload-artifact@v4
      with:
        name: SmartButtons.deb
        path: packages/*.deb