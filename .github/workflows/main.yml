name: Build Alhussaini Dylib FINAL

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Manual Theos Setup
        run: |
          git clone --recursive https://github.com/theos/theos.git ~/theos
          # تحميل الـ SDK برابط مباشر ومختلف تماماً لتجنب الفشل
          mkdir -p ~/theos/sdks
          curl -L "https://github.com/theos/sdks/raw/master/iPhoneOS14.5.sdk.tar.xz" -o ~/theos/sdks/sdk.tar.xz
          tar -xf ~/theos/sdks/sdk.tar.xz -C ~/theos/sdks/
          rm ~/theos/sdks/sdk.tar.xz
          echo "THEOS=~/theos" >> $GITHUB_ENV

      - name: Build Dylib
        run: |
          export THEOS=~/theos
          # تنظيف أي محاولات قديمة وبناء الملف من جديد
          make clean
          make package FINALPACKAGE=1
        
      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: Alhussaini-Dylib
          path: .theos/obj/*.dylib
